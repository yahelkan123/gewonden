header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  padding: 1rem 2rem;
  background: linear-gradient(to bottom, rgba(8,12,20,0.95), transparent);
  display: flex; align-items: center; gap: 1rem;

.badge {
  background: #00d4ff; color: #000; font-size: 0.65rem; font-weight: 700;

}
header h1 { font-size: 1.3rem; letter-spacing: 0.1em; text-transform: uppercase; }

#bottom-controls {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  z-index: 999;
}
.btn-play {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.55rem 1.3rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
  font-size: 0.8rem; font-weight: 600; cursor: pointer;
  background: rgba(255,255,255,0.1); color: white;
  backdrop-filter: blur(10px);
}

/* Start overlay */
#start-overlay {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #080c14; cursor: pointer;
}
#start-overlay.hidden { display: none; }
.tap-circle {
  width: 90px; height: 90px; border-radius: 50%; background: #00d4ff;
  display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;
  box-shadow: 0 0 40px rgba(0,212,255,0.4);
}
.tap-circle svg { width: 36px; height: 36px; fill: #000; margin-left: 6px; }
#start-overlay p { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-top: 0.5rem; }

<body>

  <!-- Tik om te starten -->

  <div id="start-overlay" onclick="startExperience()">
    <div class="tap-circle">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <p>Tik om te starten</p>
    <small>Draai je telefoon voor VR modus</small>
  </div>

  <header id="header">
    <span class="badge">360°</span>
    <h1>Immersive Experience</h1>
  </header>

  <div id="bottom-controls" style="display:none;">
    <button class="btn-play" id="playBtn" onclick="togglePlay()">⏸ Pauzeer</button>
  </div>

  <a-scene id="scene" vr-mode-ui="enabled: false">
    <a-assets>
      <video id="video360"
        src="Nog.mp4"
        loop
        muted
        crossorigin="anonymous"
        playsinline
        webkit-playsinline>
      </video>
    </a-assets>
    <a-videosphere src="#video360" rotation="0 180 0"></a-videosphere>
    <a-camera look-controls="enabled: true"></a-camera>
  </a-scene>

  <script>
    let playing = false;
    let vrActive = false;
    let started = false;
    const video = document.getElementById('video360');
    const scene = document.getElementById('scene');
    const header = document.getElementById('header');
    const bottomControls = document.getElementById('bottom-controls');
    const playBtn = document.getElementById('playBtn');
    const startOverlay = document.getElementById('start-overlay');

    function startExperience() {
      video.muted = true;
      video.play().then(() => {
        playing = true;
        started = true;
        updateBtn();
        startOverlay.classList.add('hidden');
        bottomControls.style.display = 'block';
        // Check of al in landscape bij starten
        checkOrientation();
      }).catch(e => {
        console.log('play error:', e);
      });
    }

    function togglePlay() {
      if (playing) {
        video.pause(); playing = false;
      } else {
        video.play(); playing = true;
      }
      updateBtn();
    }

    function updateBtn() {
      playBtn.textContent = playing ? '⏸ Pauzeer' : '▶ Afspelen';
    }

    function enterVR() {
      if (vrActive || !started) return;
      vrActive = true;
      video.play(); // zorg dat video blijft spelen
      scene.enterVR();
      header.style.display = 'none';
      bottomControls.style.display = 'none';
    }

    function exitVR() {
      if (!vrActive) return;
      vrActive = false;
      scene.exitVR();
      header.style.display = 'flex';
      bottomControls.style.display = 'block';
    }

    function checkOrientation() {
      if (!started) return;
      const isLandscape = window.innerWidth > window.innerHeight;
      if (isLandscape) enterVR();
      else exitVR();
    }

    window.addEventListener('resize', () => setTimeout(checkOrientation, 300));
    window.screen?.orientation?.addEventListener('change', () => setTimeout(checkOrientation, 300));

    scene.addEventListener('exit-vr', () => {
      vrActive = false;
      if (started) {
        header.style.display = 'flex';
        bottomControls.style.display = 'block';
      }
    });
  </script>

</body>
</html>
