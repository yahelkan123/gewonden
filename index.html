<!DOCTYPE html>

<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>360° Video Experience</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080c14; font-family: Arial, sans-serif; color: white; height: 100vh; overflow: hidden; }
    header { position: fixed; top: 0; left: 0; right: 0; z-index: 999; padding: 1rem 2rem; background: linear-gradient(to bottom, rgba(8,12,20,0.9), transparent); display: flex; align-items: center; gap: 1rem; }
    .badge { background: #00d4ff; color: #000; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; padding: 0.3rem 0.7rem; border-radius: 2px; text-transform: uppercase; }
    header h1 { font-size: 1.3rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .hint { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 999; background: rgba(0,0,0,0.6); border: 1px solid rgba(0,212,255,0.3); border-radius: 30px; padding: 0.6rem 1.5rem; font-size: 0.8rem; color: rgba(255,255,255,0.7); display: flex; gap: 1.5rem; backdrop-filter: blur(10px); }
    #play-overlay { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(8,12,20,0.85); cursor: pointer; transition: opacity 0.4s; }
    #play-overlay.hidden { opacity: 0; pointer-events: none; }
    .play-btn { width: 90px; height: 90px; border-radius: 50%; background: #00d4ff; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; box-shadow: 0 0 40px rgba(0,212,255,0.4); transition: transform 0.2s; }
    .play-btn:hover { transform: scale(1.1); }
    .play-btn svg { width: 36px; height: 36px; fill: #000; margin-left: 6px; }
    #play-overlay p { color: rgba(255,255,255,0.6); font-size: 0.9rem; }
    a-scene { height: 100vh !important; }
  </style>
</head>
<body>
  <header>
    <span class="badge">360°</span>
    <h1>Immersive Experience</h1>
  </header>

  <div id="play-overlay" onclick="startVideo()">
    <div class="play-btn">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <p>Klik om de 360° video te starten</p>
  </div>

  <div class="hint">
    <span>🖱️ Sleep om rond te kijken</span>
    <span>📱 Beweeg je telefoon</span>
    <span>⛶ Volledig scherm</span>
  </div>

  <a-scene>
    <a-assets>
      <video id="video360" src="Nog.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
    </a-assets>
    <a-videosphere src="#video360" rotation="0 180 0"></a-videosphere>
    <a-camera>
      <a-cursor color="#00d4ff"></a-cursor>
    </a-camera>
  </a-scene>

  <script>
    function startVideo() {
      const video = document.getElementById('video360');
      video.play();
      document.getElementById('play-overlay').classList.add('hidden');
    }
  </script>

</body>
</html>
