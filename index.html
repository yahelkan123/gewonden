<!DOCTYPE html>

<html lang="nl">
<head>
  <meta charset="UTF-8" />

  <title>360° Video Experience</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080c14; font-family: Arial, sans-serif; color: white; height: 100vh; overflow: hidden; }

```
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  padding: 1rem 2rem;
  background: linear-gradient(to bottom, rgba(8,12,20,0.95), transparent);
  display: flex; align-items: center; gap: 1rem;
}
.badge {
  background: #00d4ff; color: #000; font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.12em; padding: 0.3rem 0.7rem; border-radius: 2px; text-transform: uppercase;
}
header h1 { font-size: 1.3rem; letter-spacing: 0.1em; text-transform: uppercase; flex: 1; }

.controls {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  z-index: 999; transition: opacity 0.3s;
}
.controls.hidden { opacity: 0; pointer-events: none; }

.btn-vr {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.6rem 1.2rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
  font-size: 0.8rem; font-weight: 600; cursor: pointer;
  background: rgba(255,255,255,0.1); color: white;
  backdrop-filter: blur(10px);
  transition: background 0.2s;
}
.btn-vr:hover { background: rgba(255,255,255,0.2); }

/* Landscape hint */
#landscape-hint {
  position: fixed; top: 5rem; left: 50%; transform: translateX(-50%);
  z-index: 999; background: rgba(0,212,255,0.15); border: 1px solid rgba(0,212,255,0.3);
  border-radius: 20px; padding: 0.4rem 1.2rem; font-size: 0.78rem; color: #00d4ff;
  transition: opacity 0.5s;
}
#landscape-hint.hidden { opacity: 0; pointer-events: none; }

a-scene { height: 100vh !important; }
.a-enter-vr-button { display: none !important; }

  </style>
</head>
<body>

  <header id="header">
    <span class="badge">360°</span>
    <h1>Immersive Experience</h1>
  </header>

  <div id="landscape-hint">📱 Draai je telefoon voor VR modus</div>

  <div class="controls" id="controls">
    <button class="btn-vr" id="vrBtn" onclick="toggleVR()">
      🥽 VR Modus
    </button>
  </div>

  <a-scene id="scene" vr-mode-ui="enabled: false">
    <a-assets>
      <video id="video360" src="Nog.mp4" autoplay loop crossorigin="anonymous" playsinline webkit-playsinline></video>
    </a-assets>
    <a-videosphere src="#video360" rotation="0 180 0"></a-videosphere>
    <a-camera></a-camera>
  </a-scene>

  <script>
    let vrActive = false;
    const vrBtn = document.getElementById('vrBtn');
    const controls = document.getElementById('controls');
    const header = document.getElementById('header');
    const hint = document.getElementById('landscape-hint');
    const scene = document.getElementById('scene');
    const video = document.getElementById('video360');

    // Auto play
    video.play().catch(() => {
      document.addEventListener('touchstart', () => video.play(), { once: true });
      document.addEventListener('click', () => video.play(), { once: true });
    });

    function enterVR() {
      scene.enterVR();
      vrActive = true;
      controls.classList.add('hidden');
      header.style.display = 'none';
      hint.classList.add('hidden');
    }

    function exitVR() {
      scene.exitVR();
      vrActive = false;
      controls.classList.remove('hidden');
      header.style.display = 'flex';
      hint.classList.remove('hidden');
    }

    function toggleVR() {
      if (!vrActive) enterVR(); else exitVR();
    }

    // Landscape = VR aan, Portrait = VR uit
    function checkOrientation() {
      const isLandscape = window.innerWidth > window.innerHeight;
      if (isLandscape && !vrActive) {
        enterVR();
      } else if (!isLandscape && vrActive) {
        exitVR();
      }
    }

    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', () => {
      setTimeout(checkOrientation, 300);
    });

    scene.addEventListener('exit-vr', () => {
      vrActive = false;
      controls.classList.remove('hidden');
      header.style.display = 'flex';
      hint.classList.remove('hidden');
    });

    // Verberg hint na 4 seconden
    setTimeout(() => hint.classList.add('hidden'), 4000);
  </script>

</body>
</html>
